<!DOCTYPE html>
<html lang="zh-CN" class="library-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>曲库 - 卡林巴循音</title>
  <meta name="description" content="卡林巴循音曲库，支持搜索并选择练习歌曲。">
  <meta name="theme-color" content="#bd5f3b">
  <meta name="application-name" content="卡林巴循音">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="卡林巴循音">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body class="library-body">
  <main class="page library-page">
    <header class="card library-header">
      <div class="library-title">
        <div class="app-kicker">曲库 · <span id="appVersionText">v2.2.12</span></div>
        <h1>选择歌曲</h1>
      </div>
      <div class="library-actions">
        <button class="accent" id="addSongBtn" type="button">添加歌曲</button>
        <a class="ghost support-author-btn" href="./support.html" aria-label="支持与共建：打赏作者，阅读开发故事，参与曲库和 AI 化共建">
          <span class="support-entry-icon" aria-hidden="true"><span class="coffee-icon"></span></span>
          <span class="support-entry-copy">
            <strong>支持与共建</strong>
            <small>打赏 / 故事 / 共建曲库</small>
          </span>
        </a>
      </div>
    </header>

    <section class="library-tools" aria-label="歌曲筛选">
      <label class="library-search">
        <span>搜索</span>
        <input id="songSearchInput" type="search" autocomplete="off" placeholder="歌曲名、作者、说明">
      </label>
      <div class="library-count" id="songCountText">0 首</div>
    </section>

    <nav class="difficulty-tabs" id="difficultyTabs" aria-label="难度筛选"></nav>

    <section class="card import-panel" id="importPanel" hidden>
      <div class="import-head">
        <div>
          <h2>添加歌曲</h2>
          <p>复制提示词，把它和简谱照片一起发给 AI；再把 AI 返回的完整编配 JSON 粘贴回来保存。</p>
        </div>
        <button class="ghost" id="copyPromptBtn" type="button">复制提示词</button>
      </div>
      <ol class="import-steps">
        <li>复制提示词</li>
        <li>发送提示词和简谱照片给 AI</li>
        <li>复制 AI 返回的纯 JSON</li>
        <li>粘贴并保存到本地曲库</li>
      </ol>
      <div class="import-grid">
        <label class="import-field">
          <span>给 AI 的提示词</span>
          <small>用于规范 AI 如何识别简谱、转调、处理主旋律、和弦、伴奏与节奏空档。</small>
          <textarea id="aiPromptText" readonly></textarea>
        </label>
        <label class="import-field">
          <span>粘贴歌曲 JSON</span>
          <small>这里只接受 JSON；支持主旋律、和弦与自动伴奏，不会执行粘贴内容中的任何代码。</small>
          <textarea id="songJsonInput" spellcheck="false" placeholder="{ &quot;schemaVersion&quot;: 2, &quot;title&quot;: &quot;《歌曲名》&quot;, &quot;events&quot;: [ ... ] }"></textarea>
        </label>
      </div>
      <div class="import-actions">
        <button class="accent" id="importSongBtn" type="button">保存到本地曲库</button>
        <span class="import-message" id="importMessage" hidden></span>
      </div>
      <div class="local-library-manager" id="localLibraryManager">
        <div class="local-library-head">
          <h3>本地曲库管理</h3>
          <span id="localSongCountText">0 首</span>
        </div>
        <div class="local-song-list" id="localSongList"></div>
        <p class="local-song-empty" id="localSongEmptyText">暂无本地歌曲</p>
      </div>
    </section>

    <section class="song-list" id="songList" aria-label="歌曲列表"></section>
    <p class="empty-state" id="emptySongText" hidden>没有找到匹配的歌曲</p>
  </main>

  <div class="update-toast" id="updateToast" hidden role="status" aria-live="polite">
    <span>发现新版本，点击更新</span>
    <button id="updateNowBtn" type="button">立即更新</button>
    <button class="ghost" id="updateLaterBtn" type="button">稍后</button>
  </div>
  <div class="ai-thinking-modal" id="aiThinkingModal" hidden role="status" aria-live="polite">
    <div class="ai-thinking-card">
      <span class="ai-thinking-spinner" aria-hidden="true"></span>
      <strong>AI thinking......</strong>
    </div>
  </div>
  <div class="delete-confirm-modal" id="deleteConfirmModal" hidden role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle" aria-describedby="deleteConfirmText">
    <div class="delete-confirm-card">
      <h2 id="deleteConfirmTitle">确定删除这首歌曲？</h2>
      <p id="deleteConfirmText">只会从本机曲库移除，不会影响系统内置歌曲。</p>
      <div class="delete-confirm-actions">
        <button class="ghost" id="cancelDeleteBtn" type="button">取消</button>
        <button class="delete-confirm-btn" id="confirmDeleteBtn" type="button">确认删除</button>
      </div>
    </div>
  </div>
  <script type="module" src="./src/song-library.js"></script>
</body>
</html>
